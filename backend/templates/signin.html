<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Steganography System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signin-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signin-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .signin-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.error input {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .form-group.error .error-message {
            display: block;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-size: 14px;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 5px;
        }

        .remember-forgot label {
            display: inline;
            margin: 0;
            font-weight: normal;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .signin-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .signin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .signin-button:active {
            transform: translateY(0);
        }

        .signin-button.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .divider {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 20px 0;
        }

        .demo-info {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            line-height: 1.6;
        }

        .demo-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <div class="signin-header">
            <h1>🔑 Sign In</h1>
            <p>Access your secure account</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <form id="signinForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" placeholder="johndoe or john@example.com" required>
                <div class="error-message">Please enter your username or email</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <div class="error-message">Please enter your password</div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
                <a href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>

            <button type="submit" class="signin-button">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup">Create one</a>
        </div>

        <div class="demo-info">
            <strong>🧪 Demo Credentials:</strong><br>
            Username: <code>demo</code><br>
            Password: <code>demo123456</code>
        </div>
    </div>

    <script>
        // Form submission
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            const signinButton = document.querySelector('.signin-button');
            signinButton.classList.add('loading');
            signinButton.disabled = true;
            signinButton.textContent = 'Signing In...';
            
            try {
                const response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                        rememberMe: document.getElementById('rememberMe').checked
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Sign in successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Sign in failed', 'error');
                }
            } catch (error) {
                showAlert('An error occurred: ' + error.message, 'error');
            } finally {
                signinButton.classList.remove('loading');
                signinButton.disabled = false;
                signinButton.textContent = 'Sign In';
            }
        });

        function validateForm() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            let isValid = true;
            
            if (!username) {
                document.getElementById('username').parentElement.classList.add('error');
                isValid = false;
            } else {
                document.getElementById('username').parentElement.classList.remove('error');
            }
            
            if (!password) {
                document.getElementById('password').parentElement.classList.add('error');
                isValid = false;
            } else {
                document.getElementById('password').parentElement.classList.remove('error');
            }
            
            return isValid;
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            
            if (type === 'error') {
                setTimeout(() => {
                    alertDiv.className = 'alert';
                }, 5000);
            }
        }

        function handleForgotPassword(e) {
            e.preventDefault();
            showAlert('Password reset is coming soon! Please contact admin.', 'info');
        }
    </script>
</body>
</html>
